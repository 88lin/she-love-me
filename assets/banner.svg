<svg xmlns="http://www.w3.org/2000/svg" width="860" height="200" viewBox="0 0 860 200">
  <defs>
    <!-- 主渐变：深玫瑰 → 紫红 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a0a2e"/>
      <stop offset="50%"  stop-color="#2d1155"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <!-- 光晕 -->
    <radialGradient id="glow1" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c026d3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <!-- 标题文字渐变 -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f9a8d4"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <!-- 分割线渐变 -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ec4899" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#ec4899" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <!-- 卡片背景 -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#c026d3" flood-opacity="0.6"/>
    </filter>
    <clipPath id="rounded">
      <rect width="860" height="200" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- 背景 -->
    <rect width="860" height="200" fill="url(#bg)"/>
    <!-- 光晕层 -->
    <rect width="860" height="200" fill="url(#glow1)" filter="url(#blur)"/>
    <rect width="860" height="200" fill="url(#glow2)" filter="url(#blur)"/>

    <!-- 网格纹理（微弱） -->
    <line x1="0" y1="50"  x2="860" y2="50"  stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    <line x1="0" y1="100" x2="860" y2="100" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    <line x1="0" y1="150" x2="860" y2="150" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    <line x1="215" y1="0" x2="215" y2="200" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    <line x1="430" y1="0" x2="430" y2="200" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    <line x1="645" y1="0" x2="645" y2="200" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>

    <!-- 左侧装饰圆 -->
    <circle cx="38" cy="38" r="60" fill="none" stroke="#ec4899" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="38" cy="38" r="90" fill="none" stroke="#a855f7" stroke-opacity="0.08" stroke-width="1"/>
    <!-- 右侧装饰圆 -->
    <circle cx="822" cy="162" r="70" fill="none" stroke="#a855f7" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="822" cy="162" r="100" fill="none" stroke="#ec4899" stroke-opacity="0.07" stroke-width="1"/>

    <!-- 主卡片区 -->
    <rect x="32" y="24" width="796" height="152" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

    <!-- 左侧心形装饰 -->
    <text x="72" y="118" font-size="52" font-family="serif" fill="#ec4899" opacity="0.35">♡</text>

    <!-- 主标题 -->
    <text x="430" y="88"
          font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif"
          font-size="46" font-weight="700" text-anchor="middle"
          fill="url(#titleGrad)"
          filter="url(#textShadow)">她爱你吗？</text>

    <!-- 分割线 -->
    <line x1="220" y1="104" x2="640" y2="104" stroke="url(#lineGrad)" stroke-width="1.5"/>

    <!-- 副标题 -->
    <text x="430" y="148"
          font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif"
          font-size="16" font-weight="400" text-anchor="middle"
          fill="#d8b4fe" letter-spacing="1">AI · 心理学 · 帮你从聊天记录里找到答案</text>

    <!-- 右侧装饰符 -->
    <text x="786" y="118" font-size="52" font-family="serif" fill="#a855f7" opacity="0.35" text-anchor="middle">✦</text>
  </g>

  <!-- 外边框 -->
  <rect x="0.5" y="0.5" width="859" height="199" rx="15.5" fill="none"
        stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
</svg>
